<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>

<!-- Basic Page Needs
  ================================================== -->
<meta charset="utf-8">
<title>Shop</title>

<!-- Mobile Specific Metas
  ================================================== -->
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="description" content="Construction Html5 Template">
<meta name="viewport"
	content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="author" content="Themefisher">
<meta name="generator" content="Themefisher Constra HTML Template v1.0">


<!-- Themefisher Icon font -->
<link rel="stylesheet"
	th:href="@{/fe/plugins/themefisher-font/style.css}">
<!-- bootstrap.min css -->
<link rel="stylesheet"
	th:href="@{/fe/plugins/bootstrap/css/bootstrap.min.css}">

<!-- Animate css -->
<link rel="stylesheet" th:href="@{/fe/plugins/animate/animate.css}">
<!-- Slick Carousel -->
<link rel="stylesheet" th:href="@{/fe/plugins/slick/slick.css}">
<link rel="stylesheet" th:href="@{/fe/plugins/slick/slick-theme.css}">

<!-- Main Stylesheet -->
<link rel="stylesheet" th:href="@{/fe/css/style.css}">

</head>

<body id="body">

	<!-- Start Top Header Bar -->
	<div th:replace="~{/user/layout/header :: header}"></div>
	<!-- End Top Header Bar -->


	<!-- Main Menu Section -->
	<div th:replace="~{/user/layout/menu :: menu}"></div>

	<section class="page-header">
		<div class="container">
			<div class="row">
				<div class="col-md-12">
					<div class="content">
						<h1 class="page-name">Shop</h1>
						<ol class="breadcrumb">
							<li><a th:href="@{index.html}">Home</a></li>
							<li class="active">shop</li>
						</ol>
					</div>
				</div>
			</div>
		</div>
	</section>


	<section class="products section">
		<div class="container">
			<div class="row">
				<div class="col-md-3">
					<div class="widget product-category">
						<h4 class="widget-title">Bộ lọc</h4>
						<div class="panel-group commonAccordion" id="accordion"
							role="tablist" aria-multiselectable="true">
							<div class="panel panel-default">
								<div class="panel-heading" role="tab" id="headingOne">
									<h4 class="panel-title">
										<a role="button" data-toggle="collapse"
											data-parent="#accordion" th:href="@{#collapseOne}"
											aria-expanded="true" aria-controls="collapseOne"> Thương
											hiệu </a>
									</h4>
								</div>
								<div id="collapseOne" class="panel-collapse collapse in"
									role="tabpanel" aria-labelledby="headingOne">
									<form action="/shop" method="get">
										<div
											style="display: flex; flex-direction: column; align-items: center;">
											<input type="search" class="form-control" name="keyword"
												style="width: 90%; margin: 10px" placeholder="Search...">
										</div>
										<ul>
											<li th:each="item : ${listBrands}"><input
												type="checkbox" name="brand" th:value="${item.name}"
												style="margin-left: 8px;" /> <span th:text="${item.name}"
												style="padding-left: 5px;"></span></li>
										</ul>
										<div
											style="display: flex; flex-direction: column; align-items: center;">
											<input type="submit" value="Lọc" class="btn btn-default"
												style="margin: 10px; width: 90%;">
										</div>
									</form>
								</div>
							</div>
						</div>

					</div>
				</div>
				<div class="col-md-9">
					<div class="row">

						<div th:each="product : ${productList}" class="col-md-4">
							<div class="product-item">
								<div class="product-thumb">
									<span class="bage">Sale</span>
									<!-- Load URL ảnh từ DB -->
									<img class="img-responsive"
										th:src="@{${product.item.mainImage}}" alt="product-img" />
									<div class="preview-meta">
										<ul>
											<li><span data-toggle="modal"
												th:data-target="'#product-modal-' + ${product.item.id}">
													<i class="tf-ion-ios-search-strong"></i>
											</span></li>
											<li><a th:href="'/shop/'+${product.item.id}"><i
													class="tf-ion-android-cart"></i></a></li>
										</ul>
									</div>
								</div>
								<div class="product-content">
									<h4>
										<a th:href="'/shop/'+${product.item.id}"><span
											th:text="${product.item.brand.name}"></span> <span
											th:text="${product.item.name}"></span></a>
									</h4>
									<p class="price" th:text="${product.gia}"></p>
								</div>
							</div>
						</div>

						<!-- Modal -->
						<div th:each="product : ${productList}">
							<div class="modal product-modal fade"
								th:id="'product-modal-' + ${product.item.id}" tabindex="-1"
								role="dialog" aria-labelledby="productModalLabel"
								aria-hidden="true">
								<button type="button" class="close" data-dismiss="modal"
									aria-label="Close">
									<i class="tf-ion-close"></i>
								</button>
								<div class="modal-dialog" role="document">
									<div class="modal-content">
										<div class="modal-body">
											<div class="row">
												<div class="col-md-8 col-sm-6 col-xs-12">
													<div class="modal-image">
														<!-- Tải ảnh sản phẩm từ DB nếu có -->
														<img class="img-responsive"
															th:src="@{${product.item.mainImage}}" alt="product-img" />
													</div>
												</div>
												<div class="col-md-4 col-sm-6 col-xs-12">
													<div class="product-short-details">
														<h2 class="product-title" th:text="${product.item.name}"></h2>
														<p class="product-price" th:text="${product.gia}"></p>
														<p class="product-short-description"
															th:utext="${product.item.description}"></p>
														<a th:href="'/shop/'+${product.item.id}"
															class="btn btn-main">Mua ngay</a>
													</div>
												</div>
											</div>
										</div>
									</div>
								</div>
							</div>
						</div>
						<!-- /.modal -->
					</div>
					<div class="box-footer clearfix">
						<ul class="pagination pagination-sm m-0"
							style="display: flex; justify-content: center;">
							<!-- Previous page link -->
							<li th:if="${productPage.hasPrevious()}" class="page-item">
								<a class="page-link"
								th:href="@{/shop(pageNo=${productPage.number})}">«</a>
							</li>
							<!-- Page number links -->
							<li th:each="i : ${#numbers.sequence(1, productPage.totalPages)}"
								th:classappend="${productPage.number == i - 1 ? 'active' : ''}"
								class="page-item"><a class="page-link" th:text="${i}"
								th:href="@{/shop(pageNo=${i})}"></a></li>
							<!-- Next page link -->
							<li th:if="${productPage.hasNext()}" class="page-item"><a
								class="page-link"
								th:href="@{/shop(pageNo=${productPage.number + 2})}">»</a></li>
						</ul>
					</div>
				</div>

			</div>
		</div>
	</section>
	<div th:replace="~{/user/layout/footer:: footer}"></div>

	<!-- 
    Essential Scripts
    =====================================-->

	<!-- Main jQuery -->
	<script th:src="@{/fe/plugins/jquery/dist/jquery.min.js}"></script>
	<!-- Bootstrap 3.1 -->
	<script th:src="@{/fe/plugins/bootstrap/js/bootstrap.min.js}"></script>
	<!-- Bootstrap Touchpin -->
	<script
		th:src="@{/fe/plugins/bootstrap-touchspin/dist/jquery.bootstrap-touchspin.min.js}"></script>
	<!-- Instagram Feed Js -->
	<script th:src="@{/fe/plugins/instafeed/instafeed.min.js}"></script>
	<!-- Video Lightbox Plugin -->
	<script th:src="@{/fe/plugins/ekko-lightbox/dist/ekko-lightbox.min.js}"></script>
	<!-- Count Down Js -->
	<script th:src="@{/fe/plugins/syo-timer/build/jquery.syotimer.min.js}"></script>

	<!-- slick Carousel -->
	<script th:src="@{/fe/plugins/slick/slick.min.js}"></script>
	<script th:src="@{/fe/plugins/slick/slick-animation.min.js}"></script>


	<!-- Main Js File -->
	<script th:src="@{/fe/js/script.js}"></script>
	<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll("strong").forEach(element => {
            const value = parseFloat(element.innerHTML.trim());
            if (!isNaN(value)) {
                if (Number.isInteger(value)) {
                    element.innerHTML = value.toFixed(0); // Xóa .0 nếu là số nguyên
                }
            }
        });
        document.querySelectorAll(".cart-price span").forEach(span => {
            const value = parseFloat(span.textContent.trim());
            if (!isNaN(value)) {
                if (Number.isInteger(value)) {
                    span.textContent = value.toFixed(0); // Xóa .0 nếu là số nguyên
                } else {
                    span.textContent = value.toFixed(2); // Làm tròn 2 chữ số thập phân nếu không phải số nguyên
                }
            }
        });
    });
</script>


</body>
</html>
